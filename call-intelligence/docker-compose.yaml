services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile_local
    env_file:
      - ./backend/.env
    environment:
      DATA_DIR: /data
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - call_intel_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  call_intel_data:
